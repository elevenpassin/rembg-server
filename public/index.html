<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rembg Server Load Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loading-spinner" aria-hidden="true"></div>
    <p>Processing images…</p>
  </div>

  <h1>Rembg Server Load Test</h1>

  <p>This page is used to test the server load of the Rembg server.</p>

  <form id="upload-form">
    <label for="images">Upload images (max 7)</label>
    <input type="file" id="images" name="images" accept="image/*" multiple>
    <button type="submit">Remove backgrounds</button>
    <p id="upload-hint" class="hint"></p>
  </form>
  <div id="upload-results"></div>

  <script src="script.js"></script>
</body>
</html>
