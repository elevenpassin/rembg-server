<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rembg Server Load Test</title>
</head>
<body>
  <h1>Rembg Server Load Test</h1>

  <p>This page is used to test the server load of the Rembg server.</p>

  <form id="upload-form">
    <label for="images">Upload images (max 7)</label>
    <input type="file" id="images" name="images" accept="image/*" multiple>
    <button type="submit">Remove backgrounds</button>
    <p id="upload-hint" class="hint"></p>
  </form>
  <div id="upload-results"></div>

  <form id="users-form">
    <button type="submit">Get users</button>
  </form>

  <div id="status"></div>
  <ul id="user-list"></ul>

  <script src="script.js"></script>
</body>
</html>
