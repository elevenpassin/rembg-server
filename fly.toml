# fly.toml app configuration file generated for rembg-server on 2026-02-21T17:50:01+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rembg-server'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'
  build-target = 'runner-prod'

[env]
  REMBG_URL = 'http://localhost:7000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

# rembg + Node in one machine; 1GB recommended for rembg model loading
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
