# fly.toml app configuration file generated for rembg-server on 2026-03-26T20:11:29+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rembg-server'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'
  build-target = 'runner-prod'

[env]
  REMBG_URL = 'http://localhost:7000'
  U2NET_HOME = '/data/rembg'
  BOOTSTRAP_REMBG = '1'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '3m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 4096

[[mounts]]
  source = 'rembg_data'
  destination = '/data'
