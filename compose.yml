services:
  proxy:
    image: caddy:latest
    restart: unless-stopped
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    networks:
      - app_network
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "0.0.0.0:443:443/udp"
    volumes:
      - ./caddy/conf:/etc/caddy
      - ./public:/srv
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
  app:
    networks:
      - app_network
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      - REMBG_URL=http://rembg:7000
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      rembg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s
  rembg:
    image: danielgatis/rembg:latest
    command: ["s"]
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 7000), timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  app_network:
    driver: bridge
volumes:
  caddy_data:
  caddy_config:
